<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WDD 131 product review form assignment by Emmanuel Ndem.">
  <meta name="author" content="Emmanuel Ndem">
  <title>WDD 131 - Product Review - Emmanuel Ndem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/form.js" defer></script>
</head>
<body>
  <header>
    <h1>Product Review</h1>
  </header>

  <main>
    <form method="get" action="review.html">
      <label for="productName">Product Name</label>
      <select id="productName" name="product-name" required>
        <option value="" disabled selected>Select a Product ...</option>
      </select>

      <fieldset class="rating-field">
        <legend>Overall Rating</legend>
        <div class="rating-options">
          <label for="rating1">
            <span>&star;</span>
            <input type="radio" id="rating1" name="rating" value="1" required>
          </label>
          <label for="rating2">
            <span>&star;&star;</span>
            <input type="radio" id="rating2" name="rating" value="2" required>
          </label>
          <label for="rating3">
            <span>&star;&star;&star;</span>
            <input type="radio" id="rating3" name="rating" value="3" required>
          </label>
          <label for="rating4">
            <span>&star;&star;&star;&star;</span>
            <input type="radio" id="rating4" name="rating" value="4" required>
          </label>
          <label for="rating5">
            <span>&star;&star;&star;&star;&star;</span>
            <input type="radio" id="rating5" name="rating" value="5" required>
          </label>
        </div>
      </fieldset>

      <label for="installDate">Date of Installation</label>
      <input type="date" id="installDate" name="install-date" required>

      <fieldset class="features-field">
        <legend>Which features did you find useful in the product? <span>(Check all that apply)</span></legend>
        <label for="durability"><input type="checkbox" id="durability" name="useful-features" value="durability"> Durability</label>
        <label for="easeOfUse"><input type="checkbox" id="easeOfUse" name="useful-features" value="ease-of-use"> Ease of Use</label>
        <label for="performance"><input type="checkbox" id="performance" name="useful-features" value="performance"> Performance</label>
        <label for="design"><input type="checkbox" id="design" name="useful-features" value="design"> Design</label>
      </fieldset>

      <label for="writtenReview">Written Review <span class="optional">(Optional)</span></label>
      <textarea id="writtenReview" name="written-review" rows="8"></textarea>

      <label for="userName">Your Name <span class="optional">(Optional)</span></label>
      <input type="text" id="userName" name="user-name" autocomplete="name">

      <input type="submit" value="Post Review">
    </form>
  </main>

  <footer>
    <p>&copy;<span id="currentyear"></span> Emmanuel Ndem | Nigeria</p>
    <p id="lastModified"></p>
  </footer>
</body>
</html>
