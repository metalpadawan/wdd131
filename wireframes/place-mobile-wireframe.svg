<svg xmlns="http://www.w3.org/2000/svg" width="390" height="920" viewBox="0 0 390 920">
  <title>Country page mobile wireframe</title>
  <desc>Mobile wireframe for the Nigeria country page with title, small hero image, data section, weather section, and footer.</desc>
  <defs>
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#e7e7e7" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="390" height="920" fill="url(#grid)"/>
  <rect x="1" y="1" width="388" height="918" fill="none" stroke="#111" stroke-width="2"/>

  <rect x="0" y="0" width="390" height="96" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <rect x="42" y="22" width="306" height="50" fill="#fff" stroke="#111" stroke-width="1.25"/>
  <text x="195" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">Nigeria</text>

  <rect x="0" y="96" width="390" height="392" fill="#fafafa" stroke="#111" stroke-width="1.5"/>
  <line x1="0" y1="96" x2="390" y2="488" stroke="#9b9b9b" stroke-width="1"/>
  <line x1="390" y1="96" x2="0" y2="488" stroke="#9b9b9b" stroke-width="1"/>
  <text x="195" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">Small Hero Image</text>

  <rect x="10" y="508" width="370" height="168" fill="#fff" stroke="#111" stroke-width="1.25"/>
  <text x="195" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">Data</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <text x="156" y="582" text-anchor="end">Area:</text>
    <text x="216" y="582">Value</text>
    <text x="156" y="604" text-anchor="end">Population:</text>
    <text x="216" y="604">Value</text>
    <text x="156" y="626" text-anchor="end">Capital:</text>
    <text x="216" y="626">Value</text>
    <text x="156" y="648" text-anchor="end">Languages:</text>
    <text x="216" y="648">Value</text>
  </g>

  <rect x="10" y="696" width="370" height="168" fill="#fff" stroke="#111" stroke-width="1.25"/>
  <text x="195" y="736" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700">Weather</text>
  <rect x="170" y="756" width="50" height="38" fill="#fff" stroke="#777" stroke-width="1"/>
  <line x1="170" y1="756" x2="220" y2="794" stroke="#aaa" stroke-width="1"/>
  <line x1="220" y1="756" x2="170" y2="794" stroke="#aaa" stroke-width="1"/>
  <g font-family="Arial, sans-serif" font-size="15">
    <text x="158" y="818" text-anchor="end">Temperature:</text>
    <text x="206" y="818">Value</text>
    <text x="158" y="840" text-anchor="end">Conditions:</text>
    <text x="206" y="840">Value</text>
    <text x="158" y="862" text-anchor="end">Wind:</text>
    <text x="206" y="862">Value</text>
  </g>

  <rect x="0" y="878" width="390" height="42" fill="#fff" stroke="#111" stroke-width="1.5"/>
  <text x="195" y="898" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">Footer: copyright - name - country</text>
  <text x="195" y="914" text-anchor="middle" font-family="Arial, sans-serif" font-size="13">Last Modified Date</text>
</svg>
