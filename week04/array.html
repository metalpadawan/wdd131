    <h1>JavaScript Array Functions</h1>

    <section class="card">
      <h2>Names Array</h2>

        <div>
          <dt>filter()</dt>

        <div>
          <dt>map()</dt>
          <dd>Name lengths: <output id="nameLengths"></output></dd>
        </div>
        <div>
          <dt>reduce()</dt>
          <dd>Average name length: <output id="averageLength"></output></dd>
        </div>
      </dl>
    </section>
