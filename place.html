<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WDD 131 country page assignment featuring Nigeria with responsive images, weather, and data.">
  <meta name="author" content="Emmanuel Ndem">
  <title>WDD 131 - Nigeria Country Page - Emmanuel Ndem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/place.css">
  <script src="scripts/place.js" defer></script>
</head>
<body>
  <header>
    <h1>Nigeria</h1>
  </header>

  <main>
    <div class="hero">
      <picture>
        <source srcset="images/place-hero-large.webp" media="(min-width: 1000px)">
        <source srcset="images/place-hero-medium.webp" media="(min-width: 500px)">
        <img src="images/place-hero-small.webp" alt="Aba Nigeria Temple at dusk" width="1500" height="750">
      </picture>
    </div>

    <section class="info-card data-card">
      <h2>Data</h2>
      <dl>
        <div>
          <dt>Area</dt>
          <dd>923,768 sq km</dd>
        </div>
        <div>
          <dt>Population</dt>
          <dd>Over 220 million</dd>
        </div>
        <div>
          <dt>Capital</dt>
          <dd>Abuja</dd>
        </div>
        <div>
          <dt>Languages</dt>
          <dd>English, Hausa, Yoruba, Igbo</dd>
        </div>
        <div>
          <dt>Currency</dt>
          <dd>Nigerian naira</dd>
        </div>
        <div>
          <dt>Time Zone</dt>
          <dd>WAT (UTC+1)</dd>
        </div>
        <div>
          <dt>Calling Code</dt>
          <dd>+234</dd>
        </div>
        <div>
          <dt>Internet TLD</dt>
          <dd>.ng</dd>
        </div>
      </dl>
    </section>

    <section class="info-card weather-card">
      <h2>Weather</h2>
      <img class="weather-icon" src="images/weather-partly-cloudy.svg" alt="Partly cloudy" width="80" height="80">
      <dl>
        <div>
          <dt>Temperature</dt>
          <dd><span id="temperature">10</span>&deg;C</dd>
        </div>
        <div>
          <dt>Conditions</dt>
          <dd>Partly Cloudy</dd>
        </div>
        <div>
          <dt>Wind</dt>
          <dd><span id="windSpeed">5</span> km/h</dd>
        </div>
        <div>
          <dt>Wind Chill</dt>
          <dd><span id="windChill"></span></dd>
        </div>
      </dl>
    </section>
  </main>

  <footer>
    <p>&copy;<span id="currentyear"></span> Emmanuel Ndem</p>
    <p>Nigeria</p>
    <p id="lastModified"></p>
  </footer>
</body>
</html>
